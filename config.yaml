# Flow Trace 配置文件

# 服务代码路径（可选，运行时会询问）
repositories:
  # api-gateway: /path/to/api-gateway
  # user-service: /path/to/user-service
  # order-service: /path/to/order-service

# 分析配置
settings:
  max_depth: 5
  source_pattern: "src/main/java/**/*.java"

# 网关配置文件路径（可选）
gateway:
  # Spring Cloud Gateway
  spring_cloud_gateway:
    config_file: "src/main/resources/application.yml"
    
  # Kong
  kong:
    config_file: "kong.yml"
    
  # APISIX
  apisix:
    config_file: "apisix.yaml"
    
  # Nginx
  nginx:
    config_file: "nginx.conf"